apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api-deployment
  labels:
    app: fraud-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      serviceAccountName: fraud-shield-api
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: fraud-api
          image: ${IMAGE_REF}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GCS_BUCKET_NAME
              value: "${GCS_BUCKET_NAME}"
            - name: PREDICTION_PREFIX
              value: "${PREDICTION_PREFIX}"
            - name: FEEDBACK_PREFIX
              value: "${FEEDBACK_PREFIX}"
            - name: DRIFT_REPORT_PREFIX
              value: "${DRIFT_REPORT_PREFIX}"
            - name: PROJECT_ID
              value: "${PROJECT_ID}"
            - name: BQ_DATASET
              value: "${BQ_DATASET}"
            - name: APP_ENV
              value: "${APP_ENV}"
            - name: MODEL_VERSION
              value: "${MODEL_VERSION}"
            - name: PERSISTENCE_MODE
              value: "${PERSISTENCE_MODE}"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
