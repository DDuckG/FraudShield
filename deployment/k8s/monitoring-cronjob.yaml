apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-report-job
  namespace: default
  labels:
    app: fraud-monitoring
    component: drift-report
spec:
  schedule: "0 1 * * *"        # Chạy mỗi ngày lúc 1AM UTC, chỉnh tuỳ ý
  concurrencyPolicy: Forbid     # Không cho chạy song song nếu job trước chưa xong
  successfulJobsHistoryLimit: 3 # Giữ lại 3 job thành công gần nhất
  failedJobsHistoryLimit: 3     # Giữ lại 3 job thất bại gần nhất
  jobTemplate:
    spec:
      backoffLimit: 2           # Retry tối đa 2 lần nếu fail
      template:
        metadata:
          labels:
            app: fraud-monitoring
            component: drift-report
        spec:
          serviceAccountName: fraud-shield-api  # Dùng lại KSA cũ, đã có quyền GCS + BQ
          imagePullSecrets:
            - name: dockerhub-secret
          restartPolicy: OnFailure
          containers:
            - name: drift-report
              image: IMAGE_PLACEHOLDER        # Sẽ được sed thay thế trong CD pipeline
              imagePullPolicy: Always
              command:
                - /app/.venv/bin/python
                - -m
                - src.monitoring.run_drift_report
              env:
                - name: GCS_BUCKET_NAME
                  value: fraud-shield-demo
                - name: DRIFT_REPORT_PREFIX
                  value: drift-reports
                - name: PROJECT_ID
                  value: project-81c35834-dcf8-4001-9b2
                - name: BQ_DATASET
                  value: fraud_shield_monitoring
                - name: REFERENCE_DATA_PATH
                  value: data/raw/transactions.csv
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
