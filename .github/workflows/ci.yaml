name: CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - "data/raw/**"
      - "src/data/**"
      - "src/features/**"
      - "src/model/**"
      - "configs/**"
      - "dvc.yaml"
      - "params.yaml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync

      - name: Check DVC pipeline
        run: |
          test -f dvc.yaml
          uv run dvc dag

      - name: Compile source
        run: |
          uv run python -m compileall -q src
