name: CD Pipeline

permissions:
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["CT Pipeline"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID || secrets.LOCAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-southeast-1
      S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME }}
      DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO || secrets.TEST_DOCKERHUB_REPO }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.TEST_DOCKERHUB_TOKEN }}
      IMAGE_NAME: ${{ format('{0}/{1}', secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME, secrets.DOCKERHUB_REPO || secrets.TEST_DOCKERHUB_REPO) }}

    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}
      image_ref: ${{ steps.vars.outputs.IMAGE_REF }}
      drift_image_ref: ${{ steps.vars.outputs.DRIFT_IMAGE_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --no-default-groups --group train

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          {
            echo "IMAGE_TAG=${SHORT_SHA}"
            echo "IMAGE_REF=${IMAGE_NAME}:${SHORT_SHA}"
            echo "DRIFT_IMAGE_REF=${IMAGE_NAME}:monitoring-${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Start MLflow server
        run: |
          uv run --group train mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns \
            --host 0.0.0.0 \
            --port 5555 &
          sleep 5

      - name: Prepare model artifacts
        run: |
          set -euo pipefail
          if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            uv run --group train dvc pull --allow-missing || {
              echo "::warning::DVC pull failed, rebuilding artifacts locally."
              uv run --group train python src/data/get_data.py
              uv run --group train dvc repro --force
            }
            if [[ ! -f data/raw/transactions.csv || ! -f models/trained/trained_model.pkl ]]; then
              echo "::warning::Some artifacts are still missing after DVC pull. Rebuilding locally."
              uv run --group train python src/data/get_data.py
              uv run --group train dvc repro --force
            fi
          else
            echo "::warning::AWS credentials are not configured. Rebuilding artifacts locally."
            uv run --group train python src/data/get_data.py
            uv run --group train dvc repro --force
          fi

          test -f data/raw/transactions.csv
          test -f models/trained/trained_model.pkl
          test -f models/trained/model_columns.pkl
          test -f models/trained/fe_params.pkl
          test -f models/artifacts/label_encoders.pkl

      # Docker Hub login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Check model files
        run: |
          echo "=== CHECK MODELS ==="
          ls -lh models/trained

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE_REF }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Build and push drift image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile.monitoring
          push: true
          tags: |
            ${{ steps.vars.outputs.DRIFT_IMAGE_REF }}
            ${{ env.IMAGE_NAME }}:monitoring-latest

  deploy-to-gke:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      IMAGE_NAME: ${{ format('{0}/{1}', secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME, secrets.DOCKERHUB_REPO || secrets.TEST_DOCKERHUB_REPO) }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.TEST_DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.TEST_DOCKERHUB_TOKEN }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
      DRIFT_IMAGE_REF: ${{ needs.build-and-push.outputs.drift_image_ref }}
      PROJECT_ID: ${{ vars.PROJECT_ID || secrets.PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME || secrets.GCS_BUCKET_NAME }}
      PREDICTION_PREFIX: predictions
      FEEDBACK_PREFIX: feedbacks
      DRIFT_REPORT_PREFIX: drift-reports
      BQ_DATASET: ${{ vars.BQ_DATASET || 'fraud_shield_monitoring' }}
      APP_ENV: staging
      MODEL_VERSION: ${{ needs.build-and-push.outputs.image_tag }}
      PERSISTENCE_MODE: strict
      REFERENCE_DATA_PATH: data/raw/transactions.csv
      GSA_EMAIL: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GRAFANA_GSA_EMAIL: ${{ vars.GRAFANA_GSA_EMAIL || secrets.GRAFANA_GSA_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install manifest renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Debug GitHub context
        run: |
          echo "Repository: ${{ github.repository }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location:     ${{ secrets.GCP_REGION }}

      # ← Bắt buộc phải có vì GKE không tự auth được Docker Hub
      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="${DOCKERHUB_USERNAME}" \
            --docker-password="${DOCKERHUB_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Apply ServiceAccount
        run: |
          envsubst < deployment/k8s/sa.yaml | kubectl apply -f -

      - name: Render & apply Deployment
        run: |
          envsubst < deployment/k8s/deployment.yaml | kubectl apply -f -

      - name: Apply Service
        run: |
          kubectl apply -f deployment/k8s/service.yaml

      - name: Apply Drift CronJob
        run: |
          envsubst < deployment/k8s/monitoring-cronjob.yaml | kubectl apply -f -

      - name: Run drift report on deploy
        run: |
          kubectl delete job drift-report-initial --ignore-not-found=true
          kubectl create job drift-report-initial --from=cronjob/drift-report-job

          sleep 30 
          # In log realtime, không fail nếu pod chưa sẵn sàng
          kubectl logs -f -l job-name=drift-report-initial || true

          kubectl wait --for=condition=complete job/drift-report-initial --timeout=300s
        continue-on-error: true
      
      - name: Debug drift job if failed
        if: always()
        run: |
          echo "=== Job status ==="
          kubectl describe job drift-report-initial

          echo "=== Pod status ==="
          kubectl get pods -l job-name=drift-report-initial -o wide

          echo "=== Pod logs ==="
          kubectl logs -l job-name=drift-report-initial --previous || true
          kubectl logs -l job-name=drift-report-initial || true
      
      - name: Apply PodMonitoring
        run: |
          kubectl apply -f deployment/k8s/pod-monitoring.yaml

      - name: Apply Grafana Kubernetes ServiceAccount
        run: |
          envsubst < deployment/k8s/grafana/grafana-sa.yaml | kubectl apply -f -

      - name: Add Grafana Helm repo
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Deploy Grafana with Helm
        run: |
          envsubst < deployment/k8s/grafana/grafana-values.yaml > /tmp/grafana-values.yaml
          helm upgrade --install grafana grafana/grafana \
            -n default \
            -f /tmp/grafana-values.yaml \
            --set-string adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fraud-api-deployment --timeout=240s
        continue-on-error: true

      - name: Debug Pods
        run: |
          kubectl get pods -o wide
          kubectl describe pods
          POD=$(kubectl get pods -l app=fraud-api --no-headers -o custom-columns=":metadata.name" | head -1)
          echo "=== LOGS FOR POD: $POD ==="
          kubectl logs "$POD" || true
          echo "=== PREVIOUS LOGS ==="
          kubectl logs "$POD" --previous || true

      - name: Show cluster status
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Services ==="
          kubectl get services
          echo "=== External IP ==="
          kubectl get service fraud-api-service \
            --output jsonpath='{.status.loadBalancer.ingress[0].ip}'
